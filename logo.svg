<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3d2e"/>
      <stop offset="100%" stop-color="#14644a"/>
    </linearGradient>
    <radialGradient id="coreB">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2ea87f"/>
    </radialGradient>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="44" fill="url(#bgB)"/>
  <g style="transform-origin: 50px 50px; animation: melanu-spin 14s linear infinite;">
    <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#2ea87f" stroke-width="1.5" opacity="0.55" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.35" transform="rotate(120 50 50)"/>
  </g>
  <circle cx="50" cy="50" r="12" fill="url(#coreB)" filter="url(#glowB)"/>
  <text x="50" y="55" text-anchor="middle" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="800" fill="#0a3d2e">M</text>
  <style>
    @keyframes melanu-spin { to { transform: rotate(360deg); } }
  </style>
</svg>
