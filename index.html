<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melanu Technologies Pvt Ltd | >= Engineering Tomorrow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #c0c0c0; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .neon-text { text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(0,243,255,0.2); }
        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        .metallic { background: linear-gradient(145deg, #e0e0e0, #a8a8a8, #f0f0f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/90 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://i.ibb.co/your-logo.png" alt="Melanu Logo" class="h-12 w-auto" onerror="this.src='https://via.placeholder.com/180x60/111827/00f3ff?text=MELANU'">
                <div>
                    <span class="logo-font text-4xl font-bold tracking-tighter metallic">MELANU</span>
                    <p class="text-xs text-[#00f3ff] tracking-[3px] -mt-1">TECHNOLOGIES PVT LTD</p>
                </div>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-[#00f3ff]">Home</a>
                <a href="#services" class="hover:text-[#00f3ff]">Services</a>
                <a href="#products" class="hover:text-[#00f3ff]">Products</a>
                <a href="#contact" class="hover:text-[#00f3ff]">Contact</a>
            </div>
            <a href="#contact" class="bg-[#00f3ff] text-black px-6 py-3 rounded-2xl font-semibold">Get In Touch</a>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home" class="hero-bg min-h-screen flex items-center pt-20">
        <div class="max-w-7xl mx-auto px-6 text-center lg:text-left">
            <h1 class="text-6xl lg:text-7xl font-bold tracking-tighter leading-none">
                &gt;= <span class="text-white">ENGINEERING</span><br>
                TOMORROW'S<br>
                <span class="text-[#00f3ff] neon-text">INTELLIGENCE</span>
            </h1>
            <p class="text-xl mt-6 text-gray-400 max-w-2xl mx-auto lg:mx-0">AI • Cloud • DevOps • Cybersecurity • Quantum-inspired Solutions</p>
        </div>
    </section>

    <!-- CONTACT FORM with Supabase -->
    <section id="contact" class="py-24">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-5xl font-bold text-center mb-12 neon-text">Get In Touch</h2>
            
            <form id="contactForm" class="glass p-10 rounded-3xl space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <input type="text" id="name" placeholder="Your Name" required class="bg-black/70 border border-white/20 rounded-2xl px-6 py-4 focus:border-[#00f3ff] outline-none">
                    <input type="email" id="email" placeholder="Email Address" required class="bg-black/70 border border-white/20 rounded-2xl px-6 py-4 focus:border-[#00f3ff] outline-none">
                </div>
                <input type="text" id="subject" placeholder="Subject" class="w-full bg-black/70 border border-white/20 rounded-2xl px-6 py-4 focus:border-[#00f3ff] outline-none">
                <textarea id="message" rows="6" placeholder="Tell us about your project..." required class="w-full bg-black/70 border border-white/20 rounded-2xl px-6 py-4 focus:border-[#00f3ff] outline-none"></textarea>
                
                <button type="submit" class="w-full bg-[#00f3ff] hover:bg-cyan-300 text-black font-bold py-5 rounded-2xl text-lg transition-all">
                    SEND MESSAGE
                </button>
            </form>
        </div>
    </section>

    <script>
        const supabase = Supabase.createClient(
            'https://YOUR-PROJECT.supabase.co',           // ← CHANGE THIS
            'sb_publishable_1AZMRvkgLqjWefuDK2k6Yg_jTKpJ...' // ← CHANGE THIS
        );

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            const { error } = await supabase.from('contacts').insert([{
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value || 'Website Inquiry',
                message: document.getElementById('message').value
            }]);

            if (error) alert('Error: ' + error.message);
            else {
                alert('✅ Message received! Thank you.');
                e.target.reset();
            }
            btn.textContent = 'SEND MESSAGE';
            btn.disabled = false;
        });

        lucide.createIcons();
    </script>
</body>
</html>
