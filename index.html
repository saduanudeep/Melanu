<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melanu Technologies | Strategic Silicon Solutions</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .italic-caps { font-style: italic; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #02040a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Icons placeholder for CDN usage
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- GEMINI API CONFIG ---
        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        const callGeminiAPI = async (prompt, systemPrompt = "") => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Response unavailable.";
            } catch (error) { return "Connection error."; }
        };

        // --- DATA ---
        const CATEGORIES = [
            { id: "ics", name: "Integrated Circuits", icon: "cpu" },
            { id: "discrete", name: "Discrete Semi", icon: "zap" },
            { id: "displays", name: "LCD Panels", icon: "monitor" },
            { id: "aerospace", name: "Aerospace", icon: "plane" },
            { id: "sensors", name: "Sensors", icon: "microscope" }
        ];

        const PRODUCTS = [
            { id: "MN-BMS-EV800", name: "EV-Grade Smart BMS", sector: "EV", specs: "800V Architecture", pkg: "HTQFP-64" },
            { id: "MN-SIC-1200", name: "Gen3 SiC MOSFET", sector: "EV", specs: "1200V / 100A", pkg: "TO-247-4" },
            { id: "MN-RAD-MCU-7", name: "Rad-Hardened M7", sector: "Aero", specs: "400MHz Core", pkg: "CLCC-144" }
        ];

        // --- UI COMPONENTS ---
        const Logo = ({ light = false }) => (
            <div className="flex items-center gap-4 cursor-pointer">
                <div className="relative w-10 h-10 bg-slate-900 rounded-lg border border-blue-500/50 flex items-center justify-center shadow-lg">
                    <span className="text-white font-mono text-lg font-black italic">{'>='}</span>
                </div>
                <div className="flex flex-col leading-none">
                    <span className={`text-xl font-black tracking-tighter uppercase italic ${light ? 'text-white' : 'text-slate-900'}`}>Melanu</span>
                    <span className="text-[7px] font-bold text-blue-500 uppercase tracking-[0.3em]">Technologies Pvt Ltd</span>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('home');
            const [isScrolled, setIsScrolled] = useState(false);
            const [isAIOpen, setIsAIOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 40);
                window.addEventListener('scroll', handleScroll);
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [view, isAIOpen]);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full z-[1000] transition-all duration-300 ${isScrolled ? 'bg-white shadow-xl py-3' : 'bg-white/95 py-6'}`}>
                        <div className="max-w-[1400px] mx-auto px-6 flex justify-between items-center">
                            <div onClick={() => setView('home')}><Logo /></div>
                            <div className="hidden md:flex gap-8 items-center text-xs font-bold uppercase tracking-widest text-slate-600">
                                <button onClick={() => setView('catalog')} className="hover:text-blue-600">Products</button>
                                <button onClick={() => setView('home')} className="hover:text-blue-600">Applications</button>
                                <button onClick={() => setView('home')} className="hover:text-blue-600">About</button>
                                <button onClick={() => setView('home')} className="hover:text-blue-600">Contact</button>
                                <button onClick={() => setView('rfq')} className="bg-blue-600 text-white px-6 py-2 rounded shadow-lg">RFQ</button>
                            </div>
                        </div>
                    </nav>

                    <main className="pt-24">
                        {view === 'home' && (
                            <section className="relative h-[85vh] bg-[#02040a] flex items-center overflow-hidden">
                                <div className="absolute inset-0 bg-[radial-gradient(circle_at_20%_30%,_rgba(59,130,246,0.2),_transparent_70%)]"></div>
                                <div className="max-w-[1400px] mx-auto px-6 relative z-10 grid lg:grid-cols-2 gap-10">
                                    <div className="text-white space-y-8">
                                        <h1 className="text-7xl lg:text-9xl font-black italic leading-none tracking-tighter uppercase">
                                            Strategic <br/><span className="text-blue-500">Silicon</span>
                                        </h1>
                                        <p className="text-slate-400 max-w-md border-l-4 border-blue-600 pl-6 italic">
                                            High-reliability semiconductor distribution for EV, Aerospace, and Industrial clusters in India.
                                        </p>
                                        <div className="flex gap-4">
                                            <button onClick={() => setView('catalog')} className="bg-blue-600 px-10 py-4 font-bold uppercase text-xs">Explore Archive</button>
                                            <button className="border border-white/20 px-10 py-4 font-bold uppercase text-xs">Download Catalog</button>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {view === 'catalog' && (
                            <section className="py-20 px-6 max-w-[1400px] mx-auto">
                                <h2 className="text-4xl font-black italic uppercase mb-10">Component Archive</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {PRODUCTS.map(p => (
                                        <div key={p.id} className="border p-8 rounded-2xl hover:border-blue-500 transition-all shadow-sm">
                                            <span className="text-blue-500 text-[10px] font-black uppercase tracking-widest">{p.sector}</span>
                                            <h3 className="text-xl font-black mt-2">{p.id}</h3>
                                            <p className="text-slate-500 text-sm mb-4">{p.name}</p>
                                            <div className="text-xs font-mono text-slate-800 bg-slate-50 p-3 rounded">{p.specs}</div>
                                            <button className="w-full mt-6 bg-slate-900 text-white py-3 text-[10px] font-black uppercase">Technical Specs</button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-950 text-white py-20 mt-20">
                        <div className="max-w-[1400px] mx-auto px-6 grid md:grid-cols-4 gap-10">
                            <div className="col-span-2">
                                <Logo light />
                                <p className="mt-6 text-slate-500 text-sm max-w-sm">Strategic integrated platform for high-performance discrete components.</p>
                            </div>
                            <div>
                                <h4 className="text-blue-500 font-black uppercase text-[10px] mb-6 tracking-widest">Contact Node</h4>
                                <ul className="text-slate-400 text-xs space-y-4 font-bold uppercase">
                                    <li>+91 7989269904</li>
                                    <li>sales@melanu.in</li>
                                </ul>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
